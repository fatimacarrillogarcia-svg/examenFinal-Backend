name: .NET CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore ./HackerRank1.sln

      - name: Build solution
        run: dotnet build ./HackerRank1.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ./HackerRank1.sln --no-build --configuration Release
